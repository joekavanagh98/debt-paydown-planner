# Render Blueprint for the debt-paydown-planner backend.
#
# One service: the v5/v6/v7 Express + Mongoose API. The frontend
# (v4-tailwind) deploys to Vercel separately.
#
# Sensitive env vars (MONGODB_URI, JWT_SECRET, CORS_ORIGIN) use
# sync: false so Render prompts for them in the dashboard rather
# than reading from this file. The repo never holds secrets.
# Non-sensitive defaults (NODE_ENV, JWT_EXPIRES_IN, LOG_LEVEL) are
# pinned here so they survive accidental dashboard edits.
#
# rootDir limits the build to v5-backend/. The repo root has a
# preinstall guard that exits 1 on `npm install` (see
# scripts/block-root-install.mjs), so without rootDir the deploy
# would fail at install. With rootDir, Render runs the build
# commands inside v5-backend/ where the real package.json lives.

services:
  - type: web
    name: debt-paydown-planner-api
    runtime: node
    rootDir: v5-backend
    # Closest US East region to the audience (Maryland / Baltimore).
    # If Render's free tier rejects virginia at deploy time, fall back
    # to ohio, then oregon. Free-tier region availability shifts;
    # confirm in the dashboard before relying on this value.
    region: virginia
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # Inlined values: not sensitive, pinned for reproducibility.
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: LOG_LEVEL
        value: info
      # Dashboard-prompted: sensitive or per-environment.
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
